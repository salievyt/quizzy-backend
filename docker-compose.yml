version: '3.8'

services:
  web:
    build: .
    ports:
      - "8004:8004"
    volumes:
      - .:/app
      - sqlite_data:/app/data
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=backend.settings
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8004"

volumes:
  sqlite_data:
