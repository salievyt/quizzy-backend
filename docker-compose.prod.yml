version: '3.8'

services:
  web:
    build: .
    expose:
      - "8004"
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - ./media:/app/media
      - static_volume:/app/static
    environment:
      - DEBUG=0
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-me-in-production}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./media:/app/media
      - static_volume:/app/static
    depends_on:
      - web
    restart: unless-stopped

volumes:
  static_volume:
